<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avatar</title>
    <style>
        body { margin: 0; background: radial-gradient(circle, #333, #000); overflow: hidden; font-family: sans-serif; }
        canvas { display: block; }
        
        /* Loading UI */
        #loader {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: white; font-weight: bold;
            text-transform: uppercase; letter-spacing: 2px;
            display: block;
        }
    </style>
</head>
<body>

    <div id="loader">Loading Avatar...</div>

<script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
    import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';
    import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js';

    // --- Scene Setup ---
    const scene = new THREE.Scene();

    // --- Camera Setup (Best Angle Logic) ---
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 1.5, 4); // Standard Hero Angle

    // --- Renderer Setup ---
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.shadowMap.enabled = true; // Shadows for realism
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    document.body.appendChild(renderer.domElement);

    // --- Orbit Controls (Physics-like smoothness) ---
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true; // স্মুথ মুভমেন্ট
    controls.dampingFactor = 0.05;
    controls.minDistance = 2;
    controls.maxDistance = 10;
    controls.target.set(0, 1, 0);

    // --- Lighting (Studio Setup) ---
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
    scene.add(ambientLight);

    const spotLight = new THREE.DirectionalLight(0xffffff, 2);
    spotLight.position.set(5, 10, 7.5);
    spotLight.castShadow = true;
    scene.add(spotLight);

    // --- Load Avatar ---
    const loader = new GLTFLoader();
    const modelPath = './avatar.glb'; // আপনার ফাইলের নাম নিশ্চিত করুন

    loader.load(
        modelPath,
        (gltf) => {
            const model = gltf.scene;
            
            // অটো-সেন্টারিং লজিক
            const box = new THREE.Box3().setFromObject(model);
            const center = box.getCenter(new THREE.Vector3());
            model.position.x += (model.position.x - center.x);
            model.position.z += (model.position.z - center.z);
            model.position.y = 0; // পায়ের নিচ গ্রাউন্ডে রাখা

            scene.add(model);
            document.getElementById('loader').style.display = 'none';

            // মডেল এনিমেশন (Slow Auto-rotate)
            const mixer = new THREE.AnimationMixer(model);
            if (gltf.animations.length > 0) {
                const action = mixer.clipAction(gltf.animations[0]);
                action.play();
            }
        },
        (xhr) => {
            const percent = Math.round((xhr.loaded / xhr.total) * 100);
            document.getElementById('loader').innerText = `Loading: ${percent}%`;
        },
        (error) => {
            console.error('Error loading GLB:', error);
            document.getElementById('loader').innerText = 'Failed to load avatar.glb';
        }
    );

    // --- Animation Loop ---
    function animate() {
        requestAnimationFrame(animate);
        controls.update(); // Damping এর জন্য প্রয়োজন
        renderer.render(scene, camera);
    }
    animate();

    // --- Handle Window Resize ---
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

</script>
</body>
</html>
